<!DOCTYPE html>

<html lang="en">

<head>
    <meta  charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Coach Application</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap CSS-->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <header>
        <div class="container pt-5">
        <h1>Sport's Coach Job Application</h1>
        </div>

    </header>

<main>

        <form action="/action_page.php">
        <div class="mb-3 mt-3">
            <label for="First_Name" class="form-label">First Name:</label>
            <input type="text" class="form-control" id="First_Name" placeholder="Enter First Name" name="First_Name">
        </div>
        <div class="mb-3">
            <label for="Last_Name" class="form-label">Last Name:</label>
            <input type="text" class="form-control" id="Last_Name" placeholder="Enter Last Name" name="Last_Name">
        </div>
        <div class="form-check mb-3">
            <label class="form-check-label">
            </label>
        </div>
        
        </form>
        </div>
    </div>


    <div class="container pt-1">
    <label class="form-label">Birth Date:</label>
    <label></label>
    <input type="date">
    </div>

    <form class="container pt-5">
        <label>Current Address:</label>
        <div class="row pt-3">
            <div class="col-md-4">
                <label class="form-label">District/Province:</label>
                <input type="text" class="form-control" id="Dis_Prov" placeholder="Enter District/Province" name="Dis_Prov">
            </div>
            <div class="col-md-4">
                <label for="pwd">Street Address:</label>
                <input type="text" class="form-control" id="Street_Adr" placeholder="Enter Street Address" name="Street_Adr">
            </div>
            <div class="col-md-4">
                <label for="pwd">Postal/Zip Code:</label>
                <input type="text" class="form-control" id="Postal_Zip" placeholder="Enter Postal/Zip Code" name="Postal_Zip">
            </div>
        </div>
    </form>
    
    <div class="container pt-5">
    <label class="form-label">Sport of Expertise:</label>
    <select class="form-select">
        <option>Football</option>
        <option>Tennis</option>
        <option>Rugby</option>
        <option>Archery</option>
        <option>Underwater Hockey</option>
    </select>

    <label class="form-label pt-5">Phone Number:</label>
    <input type="text" class="form-control" id="PhoneNum" placeholder="Enter Phone Number" name="PhoneNum">

    <label class="form-label pt-5"></label>
    <button type="submit" class="btn btn-primary">Submit</button>
</main>


<footer>

<!--Bootstrap JS and dependencies-->

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

</footer>


</body>
